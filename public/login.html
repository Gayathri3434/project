<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Attendance Management System</title>
  <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>
  <div class="bg-image"></div>
  <div class="overlay"></div>
  
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>🎓</h1>
        <h2>Attendance Management</h2>
        <p>Login to your account</p>
      </div>
      
      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username" required>
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>
        
        <button type="submit" class="auth-btn">
          <span>🔐</span> Login
        </button>
      </form>
      
      <div class="auth-footer">
        <p>Don't have an account? <a href="register.html">Register here</a></p>
        <a href="index.html" class="back-link">← Back to Home</a>
      </div>
      
      <div class="demo-credentials">
        <h4>Demo Credentials:</h4>
        <!-- <p><strong>Admin:</strong> admin / admin123</p>
        <p><strong>Teacher:</strong> teacher1 / teacher123</p>
        <p><strong>Student:</strong> student1 / student123</p> -->
        <div class="auth-buttons auth-demo-actions">
          <button type="button" class="btn btn-primary" onclick="fillDemoCredentials('admin')">Admin Demo</button>
          <button type="button" class="btn btn-secondary" onclick="fillDemoCredentials('teacher')">Teacher Demo</button>
          <button type="button" class="btn btn-outline" onclick="fillDemoCredentials('student')">Student Demo</button>
        </div>
      </div>
    </div>
  </div>
  
  <div id="toast" class="toast"></div>
  
  <script>
    console.log('Login page script starting...');
    
    // Check sessionStorage availability
    try {
      sessionStorage.setItem('test', 'test');
      sessionStorage.removeItem('test');
    } catch (e) {
      alert('sessionStorage is required for this app. Please enable cookies and try again.');
    }
    
    // Check if already logged in
    try {
      const token = sessionStorage.getItem('token');
      const user = sessionStorage.getItem('user');

      if (token && user) {
        const currentUser = JSON.parse(user);
        if (currentUser.role === 'admin') {
          window.location.href = 'admin-dashboard.html';
        } else if (currentUser.role === 'teacher') {
          window.location.href = 'teacher-dashboard.html';
        } else {
          window.location.href = 'student-dashboard.html';
        }
      }
    } catch (e) {
      console.error('Cannot read sessionStorage:', e);
    }
    
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const submitBtn = e.target.querySelector('button[type="submit"]');
      
      // Disable button during login
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span>⏳</span> Logging in...';
      
      console.log('Attempting login for user:', username);
      
      try {
        // Use absolute URL to ensure correct port
        const apiUrl = window.location.protocol + '//' + window.location.hostname + ':5000/api/auth/login';
        console.log('Making fetch request to:', apiUrl);
        const response = await fetch(apiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        console.log('Response received, status:', response.status);
        const data = await response.json();
        console.log('Login response data:', data);
        
        if (response.ok) {
          console.log('Login successful, saving to sessionStorage...');
          sessionStorage.setItem('token', data.token);
          sessionStorage.setItem('user', JSON.stringify(data.user));
          showToast(data.message + ' Redirecting...', 'success');
          console.log('Login success, redirecting to:', data.redirect);
          
          // Use replace for a cleaner redirect (doesn't add to history)
          setTimeout(() => {
            window.location.replace(data.redirect);
          }, 300);
        } else {
          console.log('Login failed with error:', data.error);
          showToast(data.error || 'Login failed', 'error');
        }
      } catch (err) {
        console.error('Login error caught:', err);
        showToast('Login failed. Please check if the server is running.', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<span>🔐</span> Login';
      }
    });
    
    function showToast(message, type) {
      const toast = document.getElementById('toast');
      if (!toast) {
        alert(message);
        return;
      }
      toast.textContent = message;
      toast.className = 'toast ' + type + ' show';
      setTimeout(() => {
        toast.className = 'toast';
      }, 3000);
    }
      function fillDemoCredentials(role) {
      const credentials = {
        admin: { username: 'admin', password: 'admin123' },
        teacher: { username: 'teacher1', password: 'teacher123' },
        student: { username: 'student1', password: 'student123' }
      };
      const selected = credentials[role];
      if (!selected) return;
      document.getElementById('username').value = selected.username;
      document.getElementById('password').value = selected.password;
      showToast(role.charAt(0).toUpperCase() + role.slice(1) + ' credentials filled', 'success');
    }
     console.log('Login page script loaded');
  </script>
</body>
</html>
